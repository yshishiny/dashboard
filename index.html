<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariam Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.min.js" onerror="window.Recharts=null"></script>
<style>
/* ===== BASE RESET & TYPOGRAPHY ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-family:'Inter',system-ui,-apple-system,sans-serif; scroll-behavior:smooth; }
body { min-height:100vh; transition: background 0.4s, color 0.4s; }

/* ===== CSS VARIABLE THEMES ===== */
:root, [data-theme="aurora"] {
  --bg-primary: #0c0a1a;
  --bg-secondary: #151028;
  --bg-card: #1c1536;
  --bg-card-hover: #241d44;
  --bg-input: #120e24;
  --text-primary: #f0eef8;
  --text-secondary: #9b94b8;
  --text-muted: #6b6388;
  --accent-1: #a855f7;
  --accent-2: #ec4899;
  --accent-3: #6366f1;
  --gradient-main: linear-gradient(135deg, #a855f7, #ec4899);
  --gradient-card: linear-gradient(135deg, rgba(168,85,247,0.08), rgba(236,72,153,0.05));
  --border-color: rgba(168,85,247,0.15);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 32px rgba(168,85,247,0.15);
  --radius: 16px;
  --radius-sm: 10px;
  --prayer-color: #22c55e;
  --quran-color: #14b8a6;
  --sports-color: #f97316;
  --sleep-color: #3b82f6;
  --vacation-color: #f43f5e;
  --project-color: #a855f7;
  --sidebar-bg: #0a0818;
  --sidebar-active: rgba(168,85,247,0.15);
}

[data-theme="ocean"] {
  --bg-primary: #0a1628;
  --bg-secondary: #0f1e36;
  --bg-card: #142640;
  --bg-card-hover: #1a3050;
  --bg-input: #0d1a2e;
  --text-primary: #e8f0fb;
  --text-secondary: #8bacc8;
  --text-muted: #5a7d9e;
  --accent-1: #06b6d4;
  --accent-2: #0ea5e9;
  --accent-3: #2563eb;
  --gradient-main: linear-gradient(135deg, #06b6d4, #2563eb);
  --gradient-card: linear-gradient(135deg, rgba(6,182,212,0.08), rgba(37,99,235,0.05));
  --border-color: rgba(6,182,212,0.15);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 32px rgba(6,182,212,0.15);
  --sidebar-bg: #070f1e;
  --sidebar-active: rgba(6,182,212,0.15);
}

[data-theme="sunset"] {
  --bg-primary: #1a0e0a;
  --bg-secondary: #261510;
  --bg-card: #331c14;
  --bg-card-hover: #40241a;
  --bg-input: #1f1210;
  --text-primary: #fbe8e0;
  --text-secondary: #c89a88;
  --text-muted: #8a6455;
  --accent-1: #f97316;
  --accent-2: #ef4444;
  --accent-3: #eab308;
  --gradient-main: linear-gradient(135deg, #f97316, #ef4444);
  --gradient-card: linear-gradient(135deg, rgba(249,115,22,0.08), rgba(239,68,68,0.05));
  --border-color: rgba(249,115,22,0.15);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 32px rgba(249,115,22,0.15);
  --sidebar-bg: #140b08;
  --sidebar-active: rgba(249,115,22,0.15);
}

[data-theme="light"] {
  --bg-primary: #f5f3ff;
  --bg-secondary: #ede9fe;
  --bg-card: #ffffff;
  --bg-card-hover: #f9f7ff;
  --bg-input: #f0ecff;
  --text-primary: #1e1b3a;
  --text-secondary: #5b5580;
  --text-muted: #8b84a8;
  --accent-1: #7c3aed;
  --accent-2: #db2777;
  --accent-3: #4f46e5;
  --gradient-main: linear-gradient(135deg, #7c3aed, #db2777);
  --gradient-card: linear-gradient(135deg, rgba(124,58,237,0.04), rgba(219,39,119,0.03));
  --border-color: rgba(124,58,237,0.12);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-hover: 0 6px 24px rgba(124,58,237,0.1);
  --sidebar-bg: #ede9fe;
  --sidebar-active: rgba(124,58,237,0.1);
}

[data-theme="forest"] {
  --bg-primary: #0a1a10;
  --bg-secondary: #0f261a;
  --bg-card: #143322;
  --bg-card-hover: #1a4030;
  --bg-input: #0d1f15;
  --text-primary: #e0f5e8;
  --text-secondary: #88c8a0;
  --text-muted: #5a9e75;
  --accent-1: #22c55e;
  --accent-2: #10b981;
  --accent-3: #059669;
  --gradient-main: linear-gradient(135deg, #22c55e, #059669);
  --gradient-card: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(5,150,105,0.05));
  --border-color: rgba(34,197,94,0.15);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 32px rgba(34,197,94,0.15);
  --sidebar-bg: #071410;
  --sidebar-active: rgba(34,197,94,0.15);
}

/* ===== LAYOUT MODES ===== */
[data-layout="default"] { --sidebar-width: 260px; --content-gap: 24px; --card-padding: 24px; }
[data-layout="compact"] { --sidebar-width: 72px; --content-gap: 16px; --card-padding: 16px; }
[data-layout="spacious"] { --sidebar-width: 280px; --content-gap: 32px; --card-padding: 32px; }

/* ===== APP SHELL ===== */
.app-shell { display:flex; min-height:100vh; background:var(--bg-primary); color:var(--text-primary); }

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  z-index: 100;
  transition: width 0.3s;
  overflow: hidden;
}
.sidebar-logo {
  padding: 24px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border-color);
}
.sidebar-logo .logo-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--gradient-main);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: white;
  flex-shrink: 0;
}
.sidebar-logo .logo-text {
  font-size: 18px; font-weight: 700;
  background: var(--gradient-main);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
[data-layout="compact"] .logo-text,
[data-layout="compact"] .nav-label,
[data-layout="compact"] .sidebar-footer-text { display: none; }
[data-layout="compact"] .sidebar-logo { justify-content: center; padding: 24px 10px; }
[data-layout="compact"] .nav-item { justify-content: center; padding: 14px 0; }

.sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; overflow-y:auto; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: var(--radius-sm);
  color: var(--text-secondary); cursor: pointer;
  transition: all 0.2s; font-size: 14px; font-weight: 500;
  text-decoration: none; white-space: nowrap;
}
.nav-item:hover { background: var(--sidebar-active); color: var(--text-primary); }
.nav-item.active { background: var(--sidebar-active); color: var(--accent-1); font-weight: 600; }
.nav-item svg { width:20px; height:20px; flex-shrink:0; }

.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid var(--border-color);
}

/* Main content */
.main-content {
  flex: 1;
  margin-left: var(--sidebar-width);
  padding: var(--content-gap);
  transition: margin 0.3s;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.page-header {
  background: var(--gradient-main);
  border-radius: var(--radius);
  padding: 32px var(--card-padding);
  margin-bottom: var(--content-gap);
  position: relative;
  overflow: hidden;
}
.page-header::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.15) 0%, transparent 50%);
}
.page-header h1 { font-size: 28px; font-weight: 800; color: white; position: relative; z-index:1; }
.page-header p { color: rgba(255,255,255,0.8); font-size: 14px; margin-top: 4px; position: relative; z-index:1; }

/* ===== CARDS ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: var(--card-padding);
  transition: all 0.3s;
  box-shadow: var(--shadow-card);
}
.card:hover { box-shadow: var(--shadow-hover); background: var(--bg-card-hover); }
.card-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--content-gap); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--content-gap); }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--content-gap); }
.grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--content-gap); }

/* ===== STAT CARDS ===== */
.stat-card {
  background: var(--gradient-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 20px var(--card-padding);
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.3s;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
.stat-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.stat-value { font-size: 28px; font-weight: 800; line-height: 1; }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

/* ===== PROGRESS BARS ===== */
.progress-bar-bg {
  width: 100%;
  height: 8px;
  background: var(--bg-input);
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--gradient-main);
  transition: width 0.6s ease;
}

/* ===== CIRCULAR PROGRESS ===== */
.circular-progress {
  width: 80px; height: 80px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.circular-progress svg { transform: rotate(-90deg); }
.circular-progress .track { stroke: var(--bg-input); fill: none; }
.circular-progress .fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset 0.6s; }
.circular-progress .value {
  position: absolute;
  font-size: 16px; font-weight: 700;
}

/* ===== BADGES & TAGS ===== */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px;
  border-radius: 99px;
  font-size: 12px; font-weight: 600;
  white-space: nowrap;
}
.badge-prayer { background: rgba(34,197,94,0.15); color: #22c55e; }
.badge-quran { background: rgba(20,184,166,0.15); color: #14b8a6; }
.badge-sports { background: rgba(249,115,22,0.15); color: #f97316; }
.badge-sleep { background: rgba(59,130,246,0.15); color: #3b82f6; }
.badge-vacation { background: rgba(244,63,94,0.15); color: #f43f5e; }
.badge-project { background: rgba(168,85,247,0.15); color: #a855f7; }
.badge-done { background: rgba(34,197,94,0.15); color: #22c55e; }
.badge-progress { background: rgba(59,130,246,0.15); color: #3b82f6; }
.badge-blocked { background: rgba(239,68,68,0.15); color: #ef4444; }
.badge-not-started { background: rgba(156,163,175,0.15); color: #9ca3af; }

/* ===== ACTIVITY TILES ===== */
.activity-tile {
  border-radius: var(--radius);
  padding: var(--card-padding);
  border: 1px solid var(--border-color);
  transition: all 0.3s;
  cursor: pointer;
}
.activity-tile:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }

/* ===== TIMELINE ===== */
.timeline-item {
  display: flex; gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border-color);
}
.timeline-item:last-child { border-bottom: none; }
.timeline-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.timeline-time { font-size: 12px; color: var(--text-muted); margin-top:2px; }

/* ===== CALENDAR ===== */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-header {
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  padding: 8px 0;
}
.cal-day {
  aspect-ratio: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  gap: 4px;
}
.cal-day:hover { background: var(--bg-card-hover); }
.cal-day.today { background: var(--accent-1); color: white; font-weight: 700; }
.cal-day.has-event::after {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-2);
  position: absolute; bottom: 6px;
}
.cal-day.empty { pointer-events: none; }

/* ===== THEME SELECTOR ===== */
.theme-panel {
  position: fixed;
  top: 0; right: -360px;
  width: 360px; height: 100vh;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-color);
  z-index: 200;
  transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
  padding: 24px;
}
.theme-panel.open { right: 0; }
.theme-panel-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 199;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.theme-panel-overlay.open { opacity: 1; pointer-events: auto; }

.theme-swatch {
  width: 100%; padding: 16px;
  border-radius: var(--radius-sm);
  border: 2px solid transparent;
  cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: all 0.2s;
  margin-bottom: 8px;
}
.theme-swatch.active { border-color: var(--accent-1); }
.theme-swatch:hover { transform: scale(1.01); }
.swatch-colors {
  display: flex; gap: 4px;
}
.swatch-dot {
  width: 24px; height: 24px;
  border-radius: 50%;
}

/* ===== GANTT CHART ===== */
.gantt-row {
  display: flex; align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-color);
}
.gantt-label { width: 160px; font-size: 13px; color: var(--text-secondary); flex-shrink: 0; }
.gantt-track {
  flex: 1; height: 24px;
  background: var(--bg-input);
  border-radius: 6px;
  position: relative;
  overflow: hidden;
}
.gantt-fill {
  position: absolute; top: 0; height: 100%;
  border-radius: 6px;
  opacity: 0.85;
}

/* ===== MOBILE ===== */
.mobile-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--sidebar-bg);
  border-top: 1px solid var(--border-color);
  z-index: 100;
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
}
.mobile-nav-items {
  display: flex; justify-content: space-around; align-items: center;
}
.mobile-nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 12px; border-radius: 12px;
  color: var(--text-muted); font-size: 10px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.mobile-nav-item.active { color: var(--accent-1); }
.mobile-nav-item svg { width: 22px; height: 22px; }

@media (max-width: 900px) {
  .sidebar { display: none; }
  .main-content { margin-left: 0 !important; padding: 12px; padding-bottom: 80px; }
  .mobile-nav { display: block; }
  .grid-4, .grid-5 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
  .page-header { padding: 20px 16px; border-radius: 12px; margin-bottom: 16px; }
  .page-header h1 { font-size: 22px; }
  .page-header p { font-size: 12px; }
  .card { padding: 16px; border-radius: 12px; }
  .stat-card { padding: 14px 12px; gap: 10px; }
  .stat-value { font-size: 22px; }
  .stat-icon { width: 40px; height: 40px; border-radius: 10px; font-size: 18px; }
  .tab-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab-item { white-space: nowrap; font-size: 12px; padding: 6px 12px; }
  .section-gap { margin-bottom: 16px; }
  .data-table { font-size: 12px; }
  .data-table th, .data-table td { padding: 10px 8px; }
  .theme-panel { width: 100%; right: -100%; }
  .theme-panel.open { right: 0; }
  .activity-tile { padding: 14px; }
  .activity-tile .stat-value { font-size: 20px; }
  .gantt-label { width: 100px; font-size: 11px; }
  /* Mobile: stack pillar overview items vertically */
  .mobile-pillar-row { flex-direction: column !important; gap: 8px !important; align-items: flex-start !important; }
  .mobile-pillar-row .circular-progress { align-self: center; }
  /* Mobile: hide desktop-only elements */
  .desktop-only { display: none !important; }
  /* Mobile: make the customize button smaller */
  .btn-accent { padding: 6px 12px; font-size: 12px; }
}
@media (max-width: 600px) {
  .grid-4, .grid-5 { grid-template-columns: 1fr; }
  .page-header h1 { font-size: 20px; }
  .main-content { padding: 8px; padding-bottom: 80px; }
  .card { padding: 12px; }
  .stat-card { flex-direction: column; text-align: center; padding: 12px 8px; }
  .stat-icon { width: 36px; height: 36px; }
  .stat-value { font-size: 20px; }
  .stat-label { font-size: 11px; }
  /* Mobile: full-width detail panel */
  .mobile-detail-panel { width: 100% !important; }
}
/* Mobile-specific: swipeable card style */
@media (max-width: 900px) {
  .mobile-card-stack { display: flex; flex-direction: column; gap: 12px; }
  .mobile-card-stack .card { margin-bottom: 0; }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 99px; }

/* ===== TABLE ===== */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 12px 16px;
  font-size: 12px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border-color);
}
.data-table td {
  padding: 14px 16px;
  font-size: 14px;
  border-bottom: 1px solid var(--border-color);
}
.data-table tr:hover td { background: var(--bg-card-hover); }

/* ===== MISC ===== */
.btn-accent {
  background: var(--gradient-main);
  color: white; border: none;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-weight: 600; font-size: 14px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
}
.btn-accent:hover { opacity: 0.9; transform: translateY(-1px); }

.section-gap { margin-bottom: var(--content-gap); }

.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-sm { gap: 8px; }
.gap-md { gap: 16px; }
.gap-lg { gap: 24px; }
.text-sm { font-size: 13px; }
.text-xs { font-size: 11px; }
.text-muted { color: var(--text-secondary); }
.font-bold { font-weight: 700; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Tab bar */
.tab-bar { display: flex; gap: 4px; background: var(--bg-input); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px; }
.tab-item {
  padding: 8px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
  color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
}
.tab-item.active { background: var(--bg-card); color: var(--accent-1); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
</style>
</head>
<body data-theme="aurora" data-layout="default">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, createContext, useContext, useCallback } = React;

// ===== ICONS (inline SVG components) =====

// ===== MOBILE DETECTION HOOK =====
function useIsMobile(breakpoint = 900) {
  const [isMobile, setIsMobile] = useState(window.innerWidth <= breakpoint);
  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth <= breakpoint);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, [breakpoint]);
  return isMobile;
}

// ===== CIRCULAR PROGRESS COMPONENT =====
function CircularProgress({ value, max, size=80, strokeWidth=6, color='var(--accent-1)' }) {
  const r = (size - strokeWidth) / 2;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(value / max, 1);
  return (
    <div className="circular-progress" style={{ width:size, height:size }}>
      <svg width={size} height={size}>
        <circle className="track" cx={size/2} cy={size/2} r={r} strokeWidth={strokeWidth}/>
        <circle className="fill" cx={size/2} cy={size/2} r={r} strokeWidth={strokeWidth}
          stroke={color}
          strokeDasharray={circ}
          strokeDashoffset={circ * (1 - pct)}
        />
      </svg>
      <span className="value" style={{ color }}>{Math.round(pct * 100)}%</span>
    </div>
  );
}

// ===== PROGRESS BAR COMPONENT =====
function ProgressBar({ value, max=100, color }) {
  const pct = Math.min((value / max) * 100, 100);
  return (
    <div className="progress-bar-bg">
      <div className="progress-bar-fill" style={{ width: pct+'%', background: color || 'var(--gradient-main)' }}/>
    </div>
  );
}

          {['cards','table','gantt'].map(v => (
            <div key={v} className={`tab-item ${view===v?'active':''}`} onClick={()=>setView(v)}>
              {v.charAt(0).toUpperCase()+v.slice(1)}

      <Modal open={showAddPillar} onClose={() => setShowAddPillar(false)} title="New Pillar">
        <FormField label="Title"><input style={inputStyle} value={newPillar.title} onChange={e => setNewPillar({...newPillar, title:e.target.value})} placeholder="e.g. Research Paper #3"/></FormField>
        <FormField label="Description"><textarea style={{...inputStyle, minHeight:80, resize:'vertical'}} value={newPillar.description} onChange={e => setNewPillar({...newPillar, description:e.target.value})} placeholder="Brief description..."/></FormField>
        <div className="grid-2">
          <FormField label="Category"><select style={selectStyle} value={newPillar.category} onChange={e => setNewPillar({...newPillar, category:e.target.value})}><option value="project">Project</option><option value="paper">Paper</option><option value="thesis">Thesis</option><option value="other">Other</option></select></FormField>
          <FormField label="Priority"><select style={selectStyle} value={newPillar.priority} onChange={e => setNewPillar({...newPillar, priority:e.target.value})}><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select></FormField>
        </div>
        <FormField label="Due Date"><input type="date" style={inputStyle} value={newPillar.dueDate} onChange={e => setNewPillar({...newPillar, dueDate:e.target.value})}/></FormField>

      {view === 'cards' && (
        <div className={isMobile ? 'mobile-card-stack section-gap' : 'grid-3 section-gap'}>
          {pillars.map(p => {
            const stats = getPillarStats(p.id);
            return (
              <div key={p.id} className="card" style={{ cursor:'pointer' }} onClick={() => setSelected(p)}>
                <div className="flex items-center justify-between" style={{ marginBottom:16 }}>
                  <span className={`badge badge-${p.category === 'project' ? 'project' : p.category === 'thesis' ? 'sleep' : 'quran'}`}>
                    {p.category}
                  </span>
                  <span className={`badge badge-${p.status === 'in_progress' ? 'progress' : p.status === 'done' ? 'done' : p.status === 'blocked' ? 'blocked' : 'not-started'}`}>
                    {p.status.replace('_',' ')}
                  </span>
                </div>
                <h3 style={{ fontSize:18, fontWeight:700, marginBottom:6 }}>{p.title}</h3>
                <p style={{ fontSize:13, color:'var(--text-secondary)', marginBottom:16 }}>{p.description}</p>
                <ProgressBar value={stats.progress}/>
                <div className="flex items-center justify-between" style={{ marginTop:12 }}>
                  <span className="text-sm text-muted">{stats.done}/{stats.total} milestones</span>
                  <span style={{ fontSize:18, fontWeight:800, color:'var(--accent-1)' }}>{stats.progress}%</span>
                </div>
                <div style={{ marginTop:12, fontSize:12, color:'var(--text-muted)' }}>Due: {p.dueDate}</div>
              </div>
            );
          })}
        </div>
      )}

      {view === 'table' && !isMobile && (
        <div className="card">
          <table className="data-table">
            <thead>
              <tr>
                <th>Pillar</th><th>Category</th><th>Status</th><th>Progress</th><th>Milestones</th><th>Due Date</th><th>Priority</th>
              </tr>
            </thead>
            <tbody>
              {pillars.map(p => {
                const stats = getPillarStats(p.id);
                return (
                  <tr key={p.id} style={{ cursor:'pointer' }} onClick={() => setSelected(p)}>
                    <td style={{ fontWeight:600 }}>{p.title}</td>
                    <td><span className={`badge badge-${p.category === 'project' ? 'project' : 'quran'}`}>{p.category}</span></td>
                    <td><span className={`badge badge-${p.status === 'in_progress' ? 'progress' : p.status === 'done' ? 'done' : p.status === 'blocked' ? 'blocked' : 'not-started'}`}>{p.status.replace('_',' ')}</span></td>
                    <td><div style={{ display:'flex', alignItems:'center', gap:8 }}><ProgressBar value={stats.progress}/><span className="text-sm font-bold">{stats.progress}%</span></div></td>
                    <td>{stats.done}/{stats.total}</td>
                    <td style={{ color:'var(--text-secondary)' }}>{p.dueDate}</td>
                    <td><span className={`badge ${p.priority === 'high' ? 'badge-blocked' : 'badge-progress'}`}>{p.priority}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      {view === 'table' && isMobile && (
        <div className="mobile-card-stack section-gap">
          {pillars.map(p => {
            const stats = getPillarStats(p.id);
            return (
              <div key={p.id} className="card" style={{ cursor:'pointer' }} onClick={() => setSelected(p)}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                  <span style={{ fontWeight:700, fontSize:16 }}>{p.title}</span>
                  <span className={`badge ${p.priority === 'high' ? 'badge-blocked' : 'badge-progress'}`}>{p.priority}</span>
                </div>
                <div style={{ display:'flex', gap:6, marginBottom:10, flexWrap:'wrap' }}>
                  <span className={`badge badge-${p.category === 'project' ? 'project' : 'quran'}`}>{p.category}</span>
                  <span className={`badge badge-${p.status === 'in_progress' ? 'progress' : p.status === 'done' ? 'done' : p.status === 'blocked' ? 'blocked' : 'not-started'}`}>{p.status.replace('_',' ')}</span>
                </div>
                <ProgressBar value={stats.progress}/>
                <div style={{ display:'flex', justifyContent:'space-between', marginTop:8, fontSize:13, color:'var(--text-secondary)' }}>
                  <span>{stats.done}/{stats.total} milestones</span>
                  <span style={{ fontWeight:700, color:'var(--accent-1)' }}>{stats.progress}%</span>
                </div>
                <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:4 }}>Due: {p.dueDate}</div>
              </div>
            );
          })}
        </div>
      )}

      {view === 'gantt' && (
        <div className="card">
          <div className="card-title">Timeline View</div>
          <div style={{ fontSize:12, color:'var(--text-muted)', display:'flex', justifyContent:'space-between', marginBottom:16, padding:'0 160px 0 0' }}>
            {['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct'].map(m => <span key={m}>{m}</span>)}
          </div>
          {pillars.map((p, idx) => {
            const stats = getPillarStats(p.id);
            const start = (idx * 12 + 5) % 40;
            const width = Math.max(stats.progress * 0.7 + 10, 15);
            return (
              <div key={p.id} className="gantt-row">
                <div className="gantt-label">{p.title}</div>
                <div className="gantt-track">
                  <div className="gantt-fill" style={{
                    left: start+'%', width: width+'%',
                    background: p.category === 'project' ? 'var(--accent-1)' : p.category === 'thesis' ? 'var(--accent-3)' : 'var(--accent-2)',
                  }}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Add Milestone Modal */}
      <Modal open={showAddMilestone} onClose={() => setShowAddMilestone(false)} title="New Milestone">
        <FormField label="Milestone Name"><input style={inputStyle} value={newMilestone.name} onChange={e => setNewMilestone({...newMilestone, name:e.target.value})} placeholder="e.g. Literature Review"/></FormField>
        <div className="grid-2">
          <FormField label="Due Date"><input type="date" style={inputStyle} value={newMilestone.dueDate} onChange={e => setNewMilestone({...newMilestone, dueDate:e.target.value})}/></FormField>
          <FormField label="Status"><select style={selectStyle} value={newMilestone.status} onChange={e => setNewMilestone({...newMilestone, status:e.target.value})}><option value="not_started">Not Started</option><option value="in_progress">In Progress</option><option value="done">Done</option><option value="blocked">Blocked</option></select></FormField>
        </div>
        <button className="btn-accent" style={{ width:'100%', marginTop:8 }} onClick={addMilestone}>Add Milestone</button>
      </Modal>

      {/* Detail Panel */}
      {selected && (
        <div style={{ position:'fixed', inset:0, zIndex:300, display:'flex', justifyContent:'flex-end' }}>
          <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.5)' }} onClick={() => setSelected(null)}/>
          <div className="mobile-detail-panel" style={{ width:480, maxWidth:'100%', background:'var(--bg-secondary)', borderLeft:'1px solid var(--border-color)', position:'relative', overflow:'auto', padding:32 }}>
            <div className="flex items-center justify-between" style={{ marginBottom:24 }}>
              <h2 style={{ fontSize:22, fontWeight:700 }}>{selected.title}</h2>
              <div style={{ display:'flex', gap:8, alignItems:'center' }}>
                <button onClick={() => { deletePillar(selected.id); }} style={{ background:'rgba(239,68,68,0.15)', border:'none', color:'#ef4444', cursor:'pointer', padding:'6px 12px', borderRadius:'var(--radius-sm)', fontSize:12, fontWeight:600 }}>Delete Pillar</button>
                <button onClick={() => setSelected(null)} style={{ background:'none', border:'none', color:'var(--text-secondary)', cursor:'pointer', padding:4 }}><Icons.X/></button>
              </div>
            </div>
            <p style={{ color:'var(--text-secondary)', marginBottom:24 }}>{selected.description}</p>
            {(() => { const s = getPillarStats(selected.id); return <CircularProgress value={s.progress} max={100} size={100} strokeWidth={8}/>; })()}
            <div style={{ marginTop:24 }}>
              <div className="flex items-center justify-between" style={{ marginBottom:12 }}>
                <div className="card-title" style={{ marginBottom:0 }}>Milestones</div>
                <button className="btn-accent" style={{ padding:'6px 14px', fontSize:12 }} onClick={() => setShowAddMilestone(true)}>+ Add Milestone</button>
              </div>
              {milestones.filter(m => m.pillarId === selected.id).length === 0 && (
                <div style={{ padding:24, textAlign:'center', color:'var(--text-muted)', fontSize:14 }}>No milestones yet. Click "+ Add Milestone" to create one.</div>
              )}
              {milestones.filter(m => m.pillarId === selected.id).map(m => (
                <div key={m.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 0', borderBottom:'1px solid var(--border-color)' }}>
                  <div onClick={() => cycleMilestoneStatus(m.id)} style={{ width:28, height:28, borderRadius:6, background: m.status === 'done' ? 'rgba(34,197,94,0.2)' : m.status === 'in_progress' ? 'rgba(59,130,246,0.2)' : m.status === 'blocked' ? 'rgba(239,68,68,0.2)' : 'var(--bg-input)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color: m.status === 'done' ? '#22c55e' : m.status === 'in_progress' ? '#3b82f6' : m.status === 'blocked' ? '#ef4444' : 'var(--text-muted)', cursor:'pointer', transition:'all 0.2s', border:'2px solid transparent', flexShrink:0 }} title="Click to cycle status">
                    {m.status === 'done' ? '✓' : m.status === 'in_progress' ? '◐' : m.status === 'blocked' ? '✗' : '○'}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:500 }}>{m.name}</div>
                    <div className="text-xs text-muted">{m.dueDate}</div>
                  </div>
                  <span onClick={() => cycleMilestoneStatus(m.id)} style={{ cursor:'pointer' }} className={`badge badge-${m.status === 'done' ? 'done' : m.status === 'in_progress' ? 'progress' : m.status === 'blocked' ? 'blocked' : 'not-started'}`}>
                    {m.status.replace('_',' ')}
                  </span>
                  <button onClick={(e) => { e.stopPropagation(); deleteMilestone(m.id); }} style={{ background:'none', border:'none', color:'#ef4444', cursor:'pointer', fontSize:16, padding:4, opacity:0.6 }} title="Delete milestone">✕</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== CALENDAR PAGE =====
function CalendarPage() {
  const [viewMode, setViewMode] = useState('month');
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const monthName = today.toLocaleDateString('en-US', { month:'long', year:'numeric' });

  const eventDays = [3,5,7,10,12,15,16,18,20,22,25,28];
  const todayDate = today.getDate();

  const weekSchedule = [
    { day:'Mon', events:[
      { time:'05:15', label:'Fajr', color:'var(--prayer-color)' },
      { time:'08:00', label:'Thesis Writing', color:'var(--project-color)' },
      { time:'12:30', label:'Dhuhr', color:'var(--prayer-color)' },
      { time:'14:00', label:'IoT Lab', color:'var(--accent-1)' },
      { time:'16:00', label:'Gym', color:'var(--sports-color)' },
    ]},
    { day:'Tue', events:[
      { time:'05:15', label:'Fajr', color:'var(--prayer-color)' },
      { time:'09:00', label:'Paper Review', color:'var(--accent-2)' },
      { time:'12:30', label:'Dhuhr', color:'var(--prayer-color)' },
      { time:'15:00', label:'Supervisor Meeting', color:'var(--accent-3)' },
    ]},
    { day:'Wed', events:[
      { time:'05:15', label:'Fajr', color:'var(--prayer-color)' },
      { time:'08:00', label:'Data Collection', color:'var(--accent-2)' },
      { time:'12:30', label:'Dhuhr', color:'var(--prayer-color)' },
      { time:'16:00', label:'Walking', color:'var(--sports-color)' },
    ]},
    { day:'Thu', events:[
      { time:'05:15', label:'Fajr', color:'var(--prayer-color)' },
      { time:'09:00', label:'Cloud Backend Dev', color:'var(--accent-1)' },
      { time:'12:30', label:'Dhuhr', color:'var(--prayer-color)' },
      { time:'14:00', label:'White Paper Draft', color:'var(--accent-2)' },
    ]},
    { day:'Fri', events:[
      { time:'05:15', label:'Fajr', color:'var(--prayer-color)' },
      { time:'12:15', label:'Jummah', color:'var(--prayer-color)' },
      { time:'14:00', label:'Quran Study', color:'var(--quran-color)' },
      { time:'16:00', label:'Rest / Sports', color:'var(--sports-color)' },
    ]},
  ];

  return (
    <div>
      <div className="page-header">
        <h1>Calendar</h1>
        <p>Plan your days, weeks, and months</p>
      </div>

      <div className="tab-bar section-gap">
        {['day','week','month'].map(v => (
          <div key={v} className={`tab-item ${viewMode===v?'active':''}`} onClick={()=>setViewMode(v)}>
            {v.charAt(0).toUpperCase()+v.slice(1)}
          </div>
        ))}
      </div>

      {viewMode === 'month' && (
        <div className="grid-2">
          <div className="card">
            <h3 style={{ fontSize:20, fontWeight:700, marginBottom:20 }}>{monthName}</h3>
            <div className="cal-grid">
              {days.map(d => <div key={d} className="cal-header">{d}</div>)}
              {Array(firstDay).fill(null).map((_, i) => <div key={'e'+i} className="cal-day empty"/>)}
              {Array(daysInMonth).fill(null).map((_, i) => {
                const d = i + 1;
                const isToday = d === todayDate;
                const hasEvent = eventDays.includes(d);
                return (
                  <div key={d} className={`cal-day ${isToday?'today':''} ${hasEvent?'has-event':''}`}>
                    {d}
                  </div>
                );
              })}
            </div>
          </div>

          <div className="card">
            <div className="card-title">Upcoming Events</div>
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              {[
                { date:'Apr 18', label:'Supervisor Meeting', type:'project', color:'var(--project-color)' },
                { date:'Apr 20', label:'Paper Submission Deadline', type:'paper', color:'var(--accent-2)' },
                { date:'Apr 22', label:'IoT Demo Day', type:'project', color:'var(--accent-1)' },
                { date:'Apr 25', label:'Thesis Review', type:'thesis', color:'var(--accent-3)' },
                { date:'May 01', label:'Conference Registration', type:'paper', color:'var(--accent-2)' },
                { date:'May 05', label:'Sprint Planning', type:'project', color:'var(--project-color)' },
              ].map((e, i) => (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 14px', background:'var(--bg-input)', borderRadius:'var(--radius-sm)', borderLeft:`3px solid ${e.color}` }}>
                  <div style={{ minWidth:60, fontSize:13, fontWeight:600, color:e.color }}>{e.date}</div>
                  <div style={{ flex:1, fontSize:14, fontWeight:500 }}>{e.label}</div>
                  <span className={`badge badge-${e.type === 'project' ? 'project' : 'quran'}`}>{e.type}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {viewMode === 'week' && (
        <div className="card">
          <h3 style={{ fontSize:18, fontWeight:700, marginBottom:20 }}>This Week</h3>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:12 }}>
            {weekSchedule.map(ws => (
              <div key={ws.day} style={{ background:'var(--bg-input)', borderRadius:'var(--radius-sm)', padding:16 }}>
                <div style={{ fontWeight:700, fontSize:14, marginBottom:12, color:'var(--accent-1)' }}>{ws.day}</div>
                {ws.events.map((ev, i) => (
                  <div key={i} style={{ padding:'8px 10px', marginBottom:6, borderRadius:8, borderLeft:`3px solid ${ev.color}`, background:'var(--bg-card)', fontSize:12 }}>
                    <div style={{ fontWeight:600, marginBottom:2 }}>{ev.label}</div>
                    <div style={{ color:'var(--text-muted)' }}>{ev.time}</div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}

      {viewMode === 'day' && (
        <div className="card">
          <h3 style={{ fontSize:18, fontWeight:700, marginBottom:20 }}>
            Today — {today.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' })}
          </h3>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {[
              { time:'05:12', end:'05:30', label:'Fajr Prayer', color:'var(--prayer-color)', icon:'🕌' },
              { time:'06:00', end:'06:45', label:'Quran Reading', color:'var(--quran-color)', icon:'📖' },
              { time:'08:00', end:'10:00', label:'Thesis - Chapter 3', color:'var(--project-color)', icon:'📝' },
              { time:'10:00', end:'12:00', label:'IoT Cloud Backend', color:'var(--accent-1)', icon:'💻' },
              { time:'12:30', end:'12:50', label:'Dhuhr Prayer', color:'var(--prayer-color)', icon:'🕌' },
              { time:'13:00', end:'14:00', label:'Lunch Break', color:'var(--text-muted)', icon:'🍽️' },
              { time:'14:00', end:'16:00', label:'Research - Data Analysis', color:'var(--accent-2)', icon:'📊' },
              { time:'16:00', end:'17:00', label:'Walking / Exercise', color:'var(--sports-color)', icon:'🏃' },
              { time:'18:22', end:'18:40', label:'Maghrib Prayer', color:'var(--prayer-color)', icon:'🕌' },
              { time:'19:00', end:'20:30', label:'White Paper Draft', color:'var(--accent-2)', icon:'✍️' },
              { time:'19:45', end:'20:00', label:'Isha Prayer', color:'var(--prayer-color)', icon:'🕌' },
              { time:'22:00', end:'22:30', label:'Review & Plan Tomorrow', color:'var(--accent-3)', icon:'📋' },
            ].map((ev, i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:16, padding:'14px 16px', background:'var(--bg-input)', borderRadius:'var(--radius-sm)', borderLeft:`4px solid ${ev.color}` }}>
                <div style={{ minWidth:90, fontSize:13, color:'var(--text-muted)' }}>{ev.time} – {ev.end}</div>
                <div style={{ fontSize:20 }}>{ev.icon}</div>
                <div style={{ fontWeight:600, fontSize:14 }}>{ev.label}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ===== CSS BAR CHART COMPONENT =====
function CSSBarChart({ data, bars, labelKey }) {
  const maxVal = Math.max(...data.flatMap(d => bars.map(b => d[b.key])));
  return (
    <div style={{ display:'flex', alignItems:'flex-end', gap:16, height:220, padding:'10px 0' }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4, height:'100%', justifyContent:'flex-end' }}>
          <div style={{ display:'flex', gap:4, alignItems:'flex-end', flex:1 }}>
            {bars.map(b => (
              <div key={b.key} style={{
                width: 28, borderRadius:'6px 6px 0 0', background:b.color,
                height: Math.max((d[b.key]/maxVal)*180, 8)+'px',
                transition:'height 0.4s ease',
                position:'relative',
              }}>
                <span style={{ position:'absolute', top:-20, left:'50%', transform:'translateX(-50%)', fontSize:11, fontWeight:600, color:'var(--text-secondary)' }}>{d[b.key]}</span>
              </div>
            ))}
          </div>
          <span style={{ fontSize:12, color:'var(--text-muted)', marginTop:4 }}>{d[labelKey]}</span>
        </div>
      ))}
    </div>
  );
}

// ===== CSS DONUT CHART COMPONENT =====
function CSSDonutChart({ data }) {
  const total = data.reduce((s,d) => s + d.value, 0);
  let cumulative = 0;
  const segments = data.map(d => {
    const start = (cumulative / total) * 360;
    cumulative += d.value;
    const end = (cumulative / total) * 360;
    return { ...d, start, end };
  });
  const gradientParts = segments.map(s => `${s.color} ${s.start}deg ${s.end}deg`).join(', ');
  return (
    <div style={{ display:'flex', alignItems:'center', gap:32, justifyContent:'center', padding:'20px 0' }}>
      <div style={{
        width:160, height:160, borderRadius:'50%',
        background:`conic-gradient(${gradientParts})`,
        display:'flex', alignItems:'center', justifyContent:'center',
      }}>
        <div style={{ width:90, height:90, borderRadius:'50%', background:'var(--bg-card)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, fontWeight:800 }}>{total}%</div>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {data.map((d,i) => (
          <div key={i} style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:12, height:12, borderRadius:3, background:d.color }}/>
            <span style={{ fontSize:13 }}>{d.name}</span>
            <span style={{ fontSize:13, fontWeight:700, marginLeft:4 }}>{d.value}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ===== CSS LINE CHART COMPONENT =====
function CSSLineChart({ data, lines, labelKey }) {
  return (
    <div style={{ padding:'10px 0' }}>
      {lines.map(line => {
        const maxVal = Math.max(...data.map(d => d[line.key]));
        return (
          <div key={line.key} style={{ marginBottom:16 }}>
            <div style={{ fontSize:12, fontWeight:600, color:line.color, marginBottom:8 }}>{line.name}</div>
            <div style={{ display:'flex', alignItems:'flex-end', gap:8, height:80 }}>
              {data.map((d,i) => (
                <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
                  <span style={{ fontSize:11, fontWeight:600, color:line.color }}>{d[line.key]}h</span>
                  <div style={{ width:'100%', borderRadius:6, background:`${line.color}33`, height: Math.max((d[line.key]/maxVal)*60, 6)+'px', transition:'height 0.4s' }}>
                    <div style={{ width:'100%', height:'100%', borderRadius:6, background:line.color, opacity:0.7 }}/>
                  </div>
                  <span style={{ fontSize:10, color:'var(--text-muted)' }}>{d[labelKey]}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ===== APP =====
function App() {
  const [page, setPage] = useState('dashboard');
  const [theme, setTheme] = useState(localStorage.getItem('mariam-theme') || 'aurora');
  const [layout, setLayout] = useState(localStorage.getItem('mariam-layout') || 'default');
  const [themeOpen, setThemeOpen] = useState(false);
  const [pillars, setPillars] = useState(PILLARS);
  const [milestones, setMilestones] = useState(MILESTONES_DATA);

  useEffect(() => {
    document.body.setAttribute('data-theme', theme);
    localStorage.setItem('mariam-theme', theme);
  }, [theme]);

  useEffect(() => {
    document.body.setAttribute('data-layout', layout);
    localStorage.setItem('mariam-layout', layout);
  }, [layout]);

  const pages = {
    dashboard: <DashboardPage pillars={pillars} milestones={milestones}/>,
    pillars: <PillarsPage pillars={pillars} setPillars={setPillars} milestones={milestones} setMilestones={setMilestones}/>,
    calendar: <CalendarPage/>,
    activities: <ActivitiesPage/>,
    analytics: <AnalyticsPage pillars={pillars} milestones={milestones}/>,
  };

  return (
    <div className="app-shell">
      <Sidebar page={page} setPage={setPage}/>
      <main className="main-content">
        {/* Top bar with theme toggle */}
        <div className="flex items-center justify-between" style={{ marginBottom:20 }}>
          <div/>
          <button onClick={() => setThemeOpen(true)} className="btn-accent" style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 16px' }}>
            <Icons.Palette/> Customize
          </button>
        </div>

        {pages[page]}
      </main>
      <MobileNav page={page} setPage={setPage}/>
      <ThemePanel open={themeOpen} onClose={() => setThemeOpen(false)} theme={theme} setTheme={setTheme} layout={layout} setLayout={setLayout}/>
    </div>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
