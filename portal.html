<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariam Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.js"></script>
<style>
/* ===== BASE RESET & TYPOGRAPHY ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-family:'Inter',system-ui,-apple-system,sans-serif; scroll-behavior:smooth; }
body { min-height:100vh; transition: background 0.4s, color 0.4s; }

/* ===== CSS VARIABLE THEMES ===== */
:root, [data-theme="aurora"] {
  --bg-primary: #0c0a1a;
  --bg-secondary: #151028;
  --bg-card: #1c1536;
  --bg-card-hover: #241d44;
  --bg-input: #120e24;
  --text-primary: #f0eef8;
  --text-secondary: #9b94b8;
  --text-muted: #6b6388;
  --accent-1: #a855f7;
  --accent-2: #ec4899;
  --accent-3: #6366f1;
  --gradient-main: linear-gradient(135deg, #a855f7, #ec4899);
  --gradient-card: linear-gradient(135deg, rgba(168,85,247,0.08), rgba(236,72,153,0.05));
  --border-color: rgba(168,85,247,0.15);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 32px rgba(168,85,247,0.15);
  --radius: 16px;
  --radius-sm: 10px;
  --prayer-color: #22c55e;
  --quran-color: #14b8a6;
  --sports-color: #f97316;
  --sleep-color: #3b82f6;
  --vacation-color: #f43f5e;
  --project-color: #a855f7;
  --sidebar-bg: #0a0818;
  --sidebar-active: rgba(168,85,247,0.15);
}

[data-theme="ocean"] {
  --bg-primary: #0a1628;
  --bg-secondary: #0f1e36;
  --bg-card: #142640;
  --bg-card-hover: #1a3050;
  --bg-input: #0d1a2e;
  --text-primary: #e8f0fb;
  --text-secondary: #8bacc8;
  --text-muted: #5a7d9e;
  --accent-1: #06b6d4;
  --accent-2: #0ea5e9;
  --accent-3: #2563eb;
  --gradient-main: linear-gradient(135deg, #06b6d4, #2563eb);
  --gradient-card: linear-gradient(135deg, rgba(6,182,212,0.08), rgba(37,99,235,0.05));
  --border-color: rgba(6,182,212,0.15);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 32px rgba(6,182,212,0.15);
  --sidebar-bg: #070f1e;
  --sidebar-active: rgba(6,182,212,0.15);
}

[data-theme="sunset"] {
  --bg-primary: #1a0e0a;
  --bg-secondary: #261510;
  --bg-card: #331c14;
  --bg-card-hover: #40241a;
  --bg-input: #1f1210;
  --text-primary: #fbe8e0;
  --text-secondary: #c89a88;
  --text-muted: #8a6455;
  --accent-1: #f97316;
  --accent-2: #ef4444;
  --accent-3: #eab308;
  --gradient-main: linear-gradient(135deg, #f97316, #ef4444);
  --gradient-card: linear-gradient(135deg, rgba(249,115,22,0.08), rgba(239,68,68,0.05));
  --border-color: rgba(249,115,22,0.15);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 32px rgba(249,115,22,0.15);
  --sidebar-bg: #140b08;
  --sidebar-active: rgba(249,115,22,0.15);
}

[data-theme="light"] {
  --bg-primary: #f5f3ff;
  --bg-secondary: #ede9fe;
  --bg-card: #ffffff;
  --bg-card-hover: #f9f7ff;
  --bg-input: #f0ecff;
  --text-primary: #1e1b3a;
  --text-secondary: #5b5580;
  --text-muted: #8b84a8;
  --accent-1: #7c3aed;
  --accent-2: #db2777;
  --accent-3: #4f46e5;
  --gradient-main: linear-gradient(135deg, #7c3aed, #db2777);
  --gradient-card: linear-gradient(135deg, rgba(124,58,237,0.04), rgba(219,39,119,0.03));
  --border-color: rgba(124,58,237,0.12);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-hover: 0 6px 24px rgba(124,58,237,0.1);
  --sidebar-bg: #ede9fe;
  --sidebar-active: rgba(124,58,237,0.1);
}

[data-theme="forest"] {
  --bg-primary: #0a1a10;
  --bg-secondary: #0f261a;
  --bg-card: #143322;
  --bg-card-hover: #1a4030;
  --bg-input: #0d1f15;
  --text-primary: #e0f5e8;
  --text-secondary: #88c8a0;
  --text-muted: #5a9e75;
  --accent-1: #22c55e;
  --accent-2: #10b981;
  --accent-3: #059669;
  --gradient-main: linear-gradient(135deg, #22c55e, #059669);
  --gradient-card: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(5,150,105,0.05));
  --border-color: rgba(34,197,94,0.15);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 32px rgba(34,197,94,0.15);
  --sidebar-bg: #071410;
  --sidebar-active: rgba(34,197,94,0.15);
}

/* ===== LAYOUT MODES ===== */
[data-layout="default"] { --sidebar-width: 260px; --content-gap: 24px; --card-padding: 24px; }
[data-layout="compact"] { --sidebar-width: 72px; --content-gap: 16px; --card-padding: 16px; }
[data-layout="spacious"] { --sidebar-width: 280px; --content-gap: 32px; --card-padding: 32px; }

/* ===== APP SHELL ===== */
.app-shell { display:flex; min-height:100vh; background:var(--bg-primary); color:var(--text-primary); }

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  z-index: 100;
  transition: width 0.3s;
  overflow: hidden;
}
.sidebar-logo {
  padding: 24px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border-color);
}
.sidebar-logo .logo-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--gradient-main);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: white;
  flex-shrink: 0;
}
.sidebar-logo .logo-text {
  font-size: 18px; font-weight: 700;
  background: var(--gradient-main);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
[data-layout="compact"] .logo-text,
[data-layout="compact"] .nav-label,
[data-layout="compact"] .sidebar-footer-text { display: none; }
[data-layout="compact"] .sidebar-logo { justify-content: center; padding: 24px 10px; }
[data-layout="compact"] .nav-item { justify-content: center; padding: 14px 0; }

.sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; overflow-y:auto; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: var(--radius-sm);
  color: var(--text-secondary); cursor: pointer;
  transition: all 0.2s; font-size: 14px; font-weight: 500;
  text-decoration: none; white-space: nowrap;
}
.nav-item:hover { background: var(--sidebar-active); color: var(--text-primary); }
.nav-item.active { background: var(--sidebar-active); color: var(--accent-1); font-weight: 600; }
.nav-item svg { width:20px; height:20px; flex-shrink:0; }

.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid var(--border-color);
}

/* Main content */
.main-content {
  flex: 1;
  margin-left: var(--sidebar-width);
  padding: var(--content-gap);
  transition: margin 0.3s;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.page-header {
  background: var(--gradient-main);
  border-radius: var(--radius);
  padding: 32px var(--card-padding);
  margin-bottom: var(--content-gap);
  position: relative;
  overflow: hidden;
}
.page-header::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.15) 0%, transparent 50%);
}
.page-header h1 { font-size: 28px; font-weight: 800; color: white; position: relative; z-index:1; }
.page-header p { color: rgba(255,255,255,0.8); font-size: 14px; margin-top: 4px; position: relative; z-index:1; }

/* ===== CARDS ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: var(--card-padding);
  transition: all 0.3s;
  box-shadow: var(--shadow-card);
}
.card:hover { box-shadow: var(--shadow-hover); background: var(--bg-card-hover); }
.card-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--content-gap); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--content-gap); }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--content-gap); }
.grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--content-gap); }

/* ===== STAT CARDS ===== */
.stat-card {
  background: var(--gradient-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 20px var(--card-padding);
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.3s;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
.stat-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.stat-value { font-size: 28px; font-weight: 800; line-height: 1; }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

/* ===== PROGRESS BARS ===== */
.progress-bar-bg {
  width: 100%;
  height: 8px;
  background: var(--bg-input);
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--gradient-main);
  transition: width 0.6s ease;
}

/* ===== CIRCULAR PROGRESS ===== */
.circular-progress {
  width: 80px; height: 80px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.circular-progress svg { transform: rotate(-90deg); }
.circular-progress .track { stroke: var(--bg-input); fill: none; }
.circular-progress .fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset 0.6s; }
.circular-progress .value {
  position: absolute;
  font-size: 16px; font-weight: 700;
}

/* ===== BADGES & TAGS ===== */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px;
  border-radius: 99px;
  font-size: 12px; font-weight: 600;
  white-space: nowrap;
}
.badge-prayer { background: rgba(34,197,94,0.15); color: #22c55e; }
.badge-quran { background: rgba(20,184,166,0.15); color: #14b8a6; }
.badge-sports { background: rgba(249,115,22,0.15); color: #f97316; }
.badge-sleep { background: rgba(59,130,246,0.15); color: #3b82f6; }
.badge-vacation { background: rgba(244,63,94,0.15); color: #f43f5e; }
.badge-project { background: rgba(168,85,247,0.15); color: #a855f7; }
.badge-done { background: rgba(34,197,94,0.15); color: #22c55e; }
.badge-progress { background: rgba(59,130,246,0.15); color: #3b82f6; }
.badge-blocked { background: rgba(239,68,68,0.15); color: #ef4444; }
.badge-not-started { background: rgba(156,163,175,0.15); color: #9ca3af; }

/* ===== ACTIVITY TILES ===== */
.activity-tile {
  border-radius: var(--radius);
  padding: var(--card-padding);
  border: 1px solid var(--border-color);
  transition: all 0.3s;
  cursor: pointer;
}
.activity-tile:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }

/* ===== TIMELINE ===== */
.timeline-item {
  display: flex; gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border-color);
}
.timeline-item:last-child { border-bottom: none; }
.timeline-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.timeline-time { font-size: 12px; color: var(--text-muted); margin-top:2px; }

/* ===== CALENDAR ===== */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-header {
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  padding: 8px 0;
}
.cal-day {
  aspect-ratio: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  gap: 4px;
}
.cal-day:hover { background: var(--bg-card-hover); }
.cal-day.today { background: var(--accent-1); color: white; font-weight: 700; }
.cal-day.has-event::after {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-2);
  position: absolute; bottom: 6px;
}
.cal-day.empty { pointer-events: none; }

/* ===== THEME SELECTOR ===== */
.theme-panel {
  position: fixed;
  top: 0; right: -360px;
  width: 360px; height: 100vh;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-color);
  z-index: 200;
  transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
  padding: 24px;
}
.theme-panel.open { right: 0; }
.theme-panel-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 199;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.theme-panel-overlay.open { opacity: 1; pointer-events: auto; }

.theme-swatch {
  width: 100%; padding: 16px;
  border-radius: var(--radius-sm);
  border: 2px solid transparent;
  cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: all 0.2s;
  margin-bottom: 8px;
}
.theme-swatch.active { border-color: var(--accent-1); }
.theme-swatch:hover { transform: scale(1.01); }
.swatch-colors {
  display: flex; gap: 4px;
}
.swatch-dot {
  width: 24px; height: 24px;
  border-radius: 50%;
}

/* ===== GANTT CHART ===== */
.gantt-row {
  display: flex; align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-color);
}
.gantt-label { width: 160px; font-size: 13px; color: var(--text-secondary); flex-shrink: 0; }
.gantt-track {
  flex: 1; height: 24px;
  background: var(--bg-input);
  border-radius: 6px;
  position: relative;
  overflow: hidden;
}
.gantt-fill {
  position: absolute; top: 0; height: 100%;
  border-radius: 6px;
  opacity: 0.85;
}

/* ===== MOBILE ===== */
.mobile-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--sidebar-bg);
  border-top: 1px solid var(--border-color);
  z-index: 100;
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
}
.mobile-nav-items {
  display: flex; justify-content: space-around; align-items: center;
}
.mobile-nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 12px; border-radius: 12px;
  color: var(--text-muted); font-size: 10px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.mobile-nav-item.active { color: var(--accent-1); }
.mobile-nav-item svg { width: 22px; height: 22px; }

@media (max-width: 900px) {
  .sidebar { display: none; }
  .main-content { margin-left: 0; padding-bottom: 80px; }
  .mobile-nav { display: block; }
  .grid-4, .grid-5 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .grid-4, .grid-5 { grid-template-columns: 1fr; }
  .page-header h1 { font-size: 22px; }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 99px; }

/* ===== TABLE ===== */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 12px 16px;
  font-size: 12px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border-color);
}
.data-table td {
  padding: 14px 16px;
  font-size: 14px;
  border-bottom: 1px solid var(--border-color);
}
.data-table tr:hover td { background: var(--bg-card-hover); }

/* ===== MISC ===== */
.btn-accent {
  background: var(--gradient-main);
  color: white; border: none;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-weight: 600; font-size: 14px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
}
.btn-accent:hover { opacity: 0.9; transform: translateY(-1px); }

.section-gap { margin-bottom: var(--content-gap); }

.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-sm { gap: 8px; }
.gap-md { gap: 16px; }
.gap-lg { gap: 24px; }
.text-sm { font-size: 13px; }
.text-xs { font-size: 11px; }
.text-muted { color: var(--text-secondary); }
.font-bold { font-weight: 700; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Tab bar */
.tab-bar { display: flex; gap: 4px; background: var(--bg-input); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px; }
.tab-item {
  padding: 8px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
  color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
}
.tab-item.active { background: var(--bg-card); color: var(--accent-1); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
</style>
</head>
<body data-theme="aurora" data-layout="default">
<div id="root"></div>

// ===== CIRCULAR PROGRESS COMPONENT =====
function CircularProgress({ value, max, size=80, strokeWidth=6, color='var(--accent-1)' }) {
  const r = (size - strokeWidth) / 2;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(value / max, 1);
  return (
    <div className="circular-progress" style={{ width:size, height:size }}>
      <svg width={size} height={size}>
        <circle className="track" cx={size/2} cy={size/2} r={r} strokeWidth={strokeWidth}/>
        <circle className="fill" cx={size/2} cy={size/2} r={r} strokeWidth={strokeWidth}
          stroke={color}
          strokeDasharray={circ}
          strokeDashoffset={circ * (1 - pct)}
        />
      </svg>
      <span className="value" style={{ color }}>{Math.round(pct * 100)}%</span>
    </div>
  );
}

// ===== PROGRESS BAR COMPONENT =====
function ProgressBar({ value, max=100, color }) {
  const pct = Math.min((value / max) * 100, 100);
  return (
    <div className="progress-bar-bg">
      <div className="progress-bar-fill" style={{ width: pct+'%', background: color || 'var(--gradient-main)' }}/>
    </div>
  );
}

          <div className="card-title">Color Theme</div>
          {THEMES.map(t => (
            <div key={t.id} className={`theme-swatch ${theme===t.id?'active':''}`}
              style={{ background: theme===t.id ? 'var(--bg-card-hover)' : 'var(--bg-input)' }}
              onClick={() => setTheme(t.id)}>
              <div className="swatch-colors">
                {t.colors.map((c,i) => <div key={i} className="swatch-dot" style={{ background:c }}/>)}
              </div>
              <div>
                <div style={{ fontWeight:600, fontSize:14 }}>{t.name}</div>
                <div style={{ fontSize:12, color:'var(--text-muted)' }}>{t.desc}</div>
              </div>
              {theme === t.id && <div style={{ marginLeft:'auto', color:'var(--accent-1)' }}><Icons.Check/></div>}
            </div>
          ))}
        </div>

        <div>
          <div className="card-title">Layout</div>
          {LAYOUTS.map(l => (
            <div key={l.id} className={`theme-swatch ${layout===l.id?'active':''}`}
              style={{ background: layout===l.id ? 'var(--bg-card-hover)' : 'var(--bg-input)' }}
              onClick={() => setLayout(l.id)}>
              <div style={{ width:40, height:28, borderRadius:6, border:'2px solid var(--border-color)', display:'flex', overflow:'hidden' }}>
                <div style={{ width: l.id === 'compact' ? 8 : l.id === 'spacious' ? 16 : 12, background:'var(--accent-1)', opacity:0.3 }}/>
                <div style={{ flex:1, background:'var(--bg-card)' }}/>
              </div>
              <div>
                <div style={{ fontWeight:600, fontSize:14 }}>{l.name}</div>
                <div style={{ fontSize:12, color:'var(--text-muted)' }}>{l.desc}</div>
              </div>
              {layout === l.id && <div style={{ marginLeft:'auto', color:'var(--accent-1)' }}><Icons.Check/></div>}
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

// ===== SIDEBAR =====
function Sidebar({ page, setPage }) {
  const navItems = [
    { id:'dashboard', icon:<Icons.Home/>, label:'Dashboard' },
    { id:'pillars', icon:<Icons.Layers/>, label:'Pillars' },
    { id:'calendar', icon:<Icons.Calendar/>, label:'Calendar' },
    { id:'activities', icon:<Icons.Activity/>, label:'Activities' },
    { id:'analytics', icon:<Icons.BarChart/>, label:'Analytics' },
  ];

  return (
    <nav className="sidebar">
      <div className="sidebar-logo">
        <div className="logo-icon">M</div>
        <span className="logo-text">Mariam Portal</span>
      </div>
      <div className="sidebar-nav">
        {navItems.map(item => (
          <a key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={() => setPage(item.id)}>
            {item.icon}
            <span className="nav-label">{item.label}</span>
          </a>
        ))}
      </div>
      <div className="sidebar-footer">
        <a className="nav-item" style={{ fontSize:13 }}>
          <Icons.Settings/>
          <span className="sidebar-footer-text">Settings</span>
        </a>
      </div>
    </nav>
  );
}

// ===== MOBILE NAV =====
function MobileNav({ page, setPage }) {
  const items = [
    { id:'dashboard', icon:<Icons.Home/>, label:'Home' },
    { id:'pillars', icon:<Icons.Layers/>, label:'Pillars' },
    { id:'calendar', icon:<Icons.Calendar/>, label:'Calendar' },
    { id:'activities', icon:<Icons.Activity/>, label:'Activity' },
    { id:'analytics', icon:<Icons.BarChart/>, label:'Analytics' },
  ];
  return (
    <div className="mobile-nav">
      <div className="mobile-nav-items">
        {items.map(item => (
          <div key={item.id} className={`mobile-nav-item ${page===item.id?'active':''}`} onClick={() => setPage(item.id)}>
            {item.icon}
            <span>{item.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ===== APP =====
function App() {
  const [page, setPage] = useState('dashboard');
  const [theme, setTheme] = useState(localStorage.getItem('mariam-theme') || 'aurora');
  const [layout, setLayout] = useState(localStorage.getItem('mariam-layout') || 'default');
  const [themeOpen, setThemeOpen] = useState(false);

  useEffect(() => {
    document.body.setAttribute('data-theme', theme);
    localStorage.setItem('mariam-theme', theme);
  }, [theme]);

  useEffect(() => {
    document.body.setAttribute('data-layout', layout);
    localStorage.setItem('mariam-layout', layout);
  }, [layout]);

  const pages = {
    dashboard: <DashboardPage/>,
    pillars: <PillarsPage/>,
    calendar: <CalendarPage/>,
    activities: <ActivitiesPage/>,
    analytics: <AnalyticsPage/>,
  };

  return (
    <div className="app-shell">
      <Sidebar page={page} setPage={setPage}/>
      <main className="main-content">
        {/* Top bar with theme toggle */}
        <div className="flex items-center justify-between" style={{ marginBottom:20 }}>
          <div/>
          <button onClick={() => setThemeOpen(true)} className="btn-accent" style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 16px' }}>
            <Icons.Palette/> Customize
          </button>
        </div>

        {pages[page]}
      </main>
      <MobileNav page={page} setPage={setPage}/>
      <ThemePanel open={themeOpen} onClose={() => setThemeOpen(false)} theme={theme} setTheme={setTheme} layout={layout} setLayout={setLayout}/>
    </div>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
